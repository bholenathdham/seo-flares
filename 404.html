<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | SEO Flares</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05060a;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    max-width:900px;
    text-align:center;
    padding:40px;
}

.logo{
    width:220px;
    margin-bottom:30px;
}

.error-code{
    font-size:160px;
    font-weight:800;
    line-height:1;
    background:linear-gradient(90deg,#7c4dff,#ffd000);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

h1{
    font-size:48px;
    margin:15px 0;
}

.subtitle{
    color:#b5b8c5;
    font-size:20px;
    line-height:1.8;
    max-width:700px;
    margin:0 auto 40px;
}

.badge{
    display:inline-block;
    border:2px solid #ffd000;
    color:#ffd000;
    padding:12px 24px;
    border-radius:10px;
    margin-bottom:25px;
    transform:rotate(-3deg);
    font-weight:bold;
    font-size:18px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:15px 30px;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
}

.btn-primary{
    background:linear-gradient(90deg,#7c4dff,#5f2cff);
    color:white;
}

.btn-primary:hover{
    transform:translateY(-3px);
}

.btn-secondary{
    border:2px solid #ffd000;
    color:#ffd000;
}

.btn-secondary:hover{
    background:#ffd000;
    color:#000;
}

.glow1{
    position:absolute;
    width:400px;
    height:400px;
    background:#7c4dff;
    opacity:.12;
    filter:blur(150px);
    top:-100px;
    left:-100px;
}

.glow2{
    position:absolute;
    width:400px;
    height:400px;
    background:#ffd000;
    opacity:.10;
    filter:blur(150px);
    bottom:-100px;
    right:-100px;
}

.footer{
    margin-top:50px;
    color:#7f8597;
    font-size:14px;
}
</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">

    <!-- Replace with your actual logo path -->
   
    <div class="badge">
        SEO Flares Agency
    </div>

    <div class="error-code">404</div>

    <h1>Oops! Page Not Found</h1>

    <p class="subtitle">
        The page you're looking for may have been moved, deleted,
        or never existed. Let's get you back to growing your digital
        presence with SEO Flares.
    </p>

    <div class="buttons">
        <a href="/" class="btn btn-primary">
            Back To Homepage
        </a>

        <a href="/seo-services/" class="btn btn-secondary">
    Explore Services
       </a>
    </div>

    <div class="footer">
        © 2026 SEO Flares. Optimize Your Digital Solutions.
    </div>

</div>

</body>
</html>
